name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

env:
  DOTNET_VERSION: "10.0"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Remp.slnx

      - name: Build
        run: dotnet build Remp.slnx --configuration Release --no-restore

      - name: Run unit tests with coverage
        run: dotnet test Remp.Tests/Remp.Tests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Remp.Tests/TestResults
